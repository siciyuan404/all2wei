server:
  port: ":8189"

database:
  path: "all2wei.db"

storage:
  type: "minio"  # "local" 或 "minio"

minio:
  endpoint: "your-minio-endpoint:port"
  access_key_id: "your-access-key"
  secret_access_key: "your-secret-key"
  use_ssl: true
  bucket_name: "your-bucket"
  region: "us-east-1"

jwt:
  secret: "your-jwt-secret-key-change-this"
  expire: 168  # 7 days in hours
